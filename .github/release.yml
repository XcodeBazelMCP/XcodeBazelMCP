# GitHub auto-generated release notes configuration.
# Categorizes merged PRs by label so each release shows a curated
# "What's Changed" section grouped by area, like the headroom releases.
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes#configuring-automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - ignore-for-release

  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 🛠 Hardening & Validation
      labels:
        - hardening
        - validation
        - testing
        - ci
    - title: 📦 Dependencies
      labels:
        - dependencies
    - title: 📚 Documentation
      labels:
        - documentation
        - docs
    - title: 🔧 Maintenance
      labels:
        - chore
        - maintenance
        - refactor
